<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E1E1E" />
            <stop offset="100%" stop-color="#121212" />
        </linearGradient>
        <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#18A0FB" />
            <stop offset="100%" stop-color="#0B8CE1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.6" />
        </filter>
    </defs>
    
    <!-- Base App Icon Shape -->
    <rect width="512" height="512" rx="112" fill="url(#bg)" />
    <!-- Subtle Inner Border -->
    <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4" />
    
    <!-- Icon -->
    <g transform="translate(128, 128) scale(10.66)" filter="url(#shadow)">
       <!-- Glow behind -->
        <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0L21.4 5.6c.8.8.8 2 0 2.8L10 20" 
              fill="none" 
              stroke="rgba(24, 160, 251, 0.5)" 
              stroke-width="2.5" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              filter="url(#glow)"/>
        
        <!-- Main Path -->
        <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0L21.4 5.6c.8.8.8 2 0 2.8L10 20" 
              fill="none" 
              stroke="url(#iconGradient)" 
              stroke-width="2.5" 
              stroke-linecap="round" 
              stroke-linejoin="round" />
    </g>
</svg>
