<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        /* ─── MS Paint / Win95 Design Tokens ──────────────────── */
        :root {
            --bg: #c0c0c0;
            --bg-surface: #ffffff;
            --bg-elevated: #c0c0c0;
            --border-light: #dfdfdf;
            --border-white: #ffffff;
            --border-dark: #808080;
            --border-black: #000000;
            --text: #000000;
            --text-dim: #808080;
            --text-inverse: #ffffff;
            --accent: #000080;
            /* Windows title blue */
            --accent-hover: #1084d0;
            --danger: #ff0000;
            --danger-hover: #cc0000;
            --success: #008000;
            --font: 'MS Sans Serif', 'Tahoma', 'Pixelated', sans-serif;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: none;
            font-size: 11px;
        }

        /* ─── UI Framework ────────────────────────────────────────── */
        .win95-outset {
            border-top: 1px solid var(--border-white) !important;
            border-left: 1px solid var(--border-white) !important;
            border-right: 1px solid var(--border-black) !important;
            border-bottom: 1px solid var(--border-black) !important;
            box-shadow: inset -1px -1px 0 var(--border-dark), inset 1px 1px 0 var(--border-light) !important;
            background: var(--bg) !important;
        }

        .win95-inset {
            border-top: 1px solid var(--border-dark) !important;
            border-left: 1px solid var(--border-dark) !important;
            border-right: 1px solid var(--border-white) !important;
            border-bottom: 1px solid var(--border-white) !important;
            box-shadow: inset 1px 1px 0 var(--border-black), inset -1px -1px 0 var(--border-light) !important;
            background: var(--bg-surface) !important;
        }

        /* ─── Layout ────────────────────────────────────────── */
        .plugin-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 4px;
            gap: 4px;
            background: var(--bg);
        }

        /* ─── Header ────────────────────────────────────────── */
        .header {
            background: var(--accent);
            color: var(--text-inverse);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 4px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .header-title svg {
            stroke: var(--text-inverse);
        }

        .header-badge {
            background: #c0c0c0;
            color: #000;
            padding: 0 4px;
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-right: 1px solid #808080;
            border-bottom: 1px solid #808080;
            font-size: 11px;
            font-weight: bold;
        }

        /* ─── Canvas Area ───────────────────────────────────── */
        .canvas-area {
            flex: 1;
            position: relative;
            min-height: 0;
            margin: 4px 6px;
            display: flex;
            flex-direction: row;
        }

        /* ─── Left Win95 Toolbar (MS Paint Tools) ────────────────────────────────────────── */
        .left-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            width: 60px;
            gap: 0;
            padding: 2px;
            background: var(--bg);
        }

        .win95-tool-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-top: 2px solid var(--border-white);
            border-left: 2px solid var(--border-white);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            cursor: pointer;
            box-sizing: border-box;
        }

        .win95-tool-btn svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: var(--text);
            stroke-width: 1.5;
        }

        .win95-tool-btn:active,
        .win95-tool-btn.active {
            border-top: 2px solid var(--border-dark);
            border-left: 2px solid var(--border-dark);
            border-right: 2px solid var(--border-white);
            border-bottom: 2px solid var(--border-white);
            background: url("data:image/svg+xml;utf8,<svg width='2' height='2' xmlns='http://www.w3.org/2000/svg'><rect width='1' height='1' fill='%23ffffff'/><rect x='1' y='1' width='1' height='1' fill='%23c0c0c0'/></svg>");
            padding-top: 2px;
            padding-left: 2px;
        }

        .win95-tool-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* The settings section (stroke size) shown at the bottom of left toolbar */
        .tool-settings {
            margin-top: 4px;
            width: 48px;
            height: 60px;
            border-top: 1px solid var(--border-dark);
            border-left: 1px solid var(--border-dark);
            border-right: 1px solid var(--border-white);
            border-bottom: 1px solid var(--border-white);
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
        }

        .stroke-preview {
            background: var(--text);
            border-radius: 50%;
        }

        .stroke-1 {
            width: 3px;
            height: 3px;
        }

        .stroke-2 {
            width: 6px;
            height: 6px;
        }

        .stroke-3 {
            width: 10px;
            height: 10px;
        }

        .canvas-wrapper {
            position: relative;
            flex: 1;
            border-top: 2px solid var(--border-dark);
            border-left: 2px solid var(--border-dark);
            border-right: 2px solid var(--border-white);
            border-bottom: 2px solid var(--border-white);
            background: var(--bg-surface);
            overflow: hidden;
            touch-action: none;
        }

        .canvas-inner {
            position: absolute;
            transform-origin: 0 0;
        }

        .canvas-inner canvas {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
        }

        #checkerboard {
            z-index: 1;
            opacity: 0.5;
        }

        #image-canvas {
            z-index: 2;
        }

        #mask-canvas {
            z-index: 3;
            opacity: 0;
        }

        #brush-canvas {
            z-index: 4;
            cursor: none;
        }

        /* Zoom indicator */
        .zoom-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-size: 11px;
            padding: 2px 4px;
            background: var(--bg);
            color: var(--text);
            border-top: 1px solid var(--border-white);
            border-left: 1px solid var(--border-white);
            border-right: 1px solid var(--border-black);
            border-bottom: 1px solid var(--border-black);
            z-index: 50;
            pointer-events: none;
        }

        .zoom-controls {
            position: absolute;
            bottom: 8px;
            left: 8px;
            display: flex;
            gap: 4px;
            z-index: 50;
        }

        .zoom-btn {
            width: 20px;
            height: 20px;
            font-size: 12px;
            font-weight: bold;
            background: var(--bg);
            border: none;
            cursor: pointer;
            color: var(--text);
            border-top: 1px solid var(--border-white);
            border-left: 1px solid var(--border-white);
            border-right: 1px solid var(--border-black);
            border-bottom: 1px solid var(--border-black);
            box-shadow: inset -1px -1px 0 var(--border-dark), inset 1px 1px 0 var(--border-light);
        }

        .zoom-btn:active {
            border-top: 1px solid var(--border-black);
            border-left: 1px solid var(--border-black);
            border-right: 1px solid var(--border-white);
            border-bottom: 1px solid var(--border-white);
            box-shadow: inset 1px 1px 0 var(--border-dark);
            padding-top: 1px;
            padding-left: 1px;
        }

        /* Cursor overlay */
        .cursor-ring {
            position: fixed;
            pointer-events: none;
            border: 1px dashed #000;
            border-radius: 50%;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 0 1px #fff;
            mix-blend-mode: difference;
        }

        /* ─── Empty State ───────────────────────────────────── */
        .empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
        }

        .empty-state-icon svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: var(--border-dark);
        }

        .empty-state-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text);
        }

        .empty-state-desc {
            font-size: 11px;
            color: var(--text);
        }

        /* ─── Bottom Palette/Slider ───────────────────────────────────────── */
        .bottom-area {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 6px;
            background: var(--bg);
        }

        /* ─── Sliders ───────────────────────────────────────── */
        .sliders-row {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .slider-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border-dark);
            border-bottom: 1px solid var(--border-white);
            border-right: 1px solid var(--border-white);
            outline: none;
            box-shadow: inset 1px 1px 0 var(--border-black);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 18px;
            background: var(--bg);
            border-top: 1px solid var(--border-white);
            border-left: 1px solid var(--border-white);
            border-right: 1px solid var(--border-black);
            border-bottom: 1px solid var(--border-black);
            box-shadow: inset -1px -1px 0 var(--border-dark), inset 1px 1px 0 var(--border-light);
            cursor: pointer;
        }

        /* ─── Action Buttons ────────────────────────────────── */
        .actions-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 4px 14px;
            font-size: 11px;
            font-weight: normal;
            background: var(--bg);
            border: none;
            cursor: pointer;
            color: var(--text);
            border-top: 1px solid var(--border-white);
            border-left: 1px solid var(--border-white);
            border-right: 1px solid var(--border-black);
            border-bottom: 1px solid var(--border-black);
            box-shadow: inset -1px -1px 0 var(--border-dark), inset 1px 1px 0 var(--border-light);
            text-align: center;
        }

        .btn:active:not(:disabled) {
            border-top: 1px solid var(--border-black);
            border-left: 1px solid var(--border-black);
            border-right: 1px solid var(--border-white);
            border-bottom: 1px solid var(--border-white);
            box-shadow: inset 1px 1px 0 var(--border-dark);
            padding-top: 5px;
            padding-bottom: 3px;
        }

        .btn:disabled {
            color: var(--border-dark);
            text-shadow: 1px 1px 0 var(--border-white);
        }

        .btn-primary {
            font-weight: bold;
        }

        /* ─── Status bar ────────────────────────────────────── */
        .status-bar {
            font-size: 11px;
            padding: 2px 4px;
            margin: 0 4px;
            border-top: 1px solid var(--border-dark);
            border-left: 1px solid var(--border-dark);
            border-right: 1px solid var(--border-white);
            border-bottom: 1px solid var(--border-white);
            box-shadow: inset 1px 1px 0 var(--border-black);
            color: var(--text);
            height: 20px;
            display: flex;
            align-items: center;
            background: var(--bg);
        }

        /* ─── Loading State ─────────────────────────────────── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
            gap: 12px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid var(--border-white);
            border-top: 4px solid var(--border-dark);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 11px;
            font-weight: bold;
        }

        /* ─── Toast (Win95 Dialog) ────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 8px 16px;
            font-size: 11px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            background: var(--bg);
            border: none;
            border-top: 1px solid var(--border-white);
            border-left: 1px solid var(--border-white);
            border-right: 1px solid var(--border-black);
            border-bottom: 1px solid var(--border-black);
            box-shadow: inset -1px -1px 0 var(--border-dark), inset 1px 1px 0 var(--border-light);
            color: var(--text);
            font-weight: bold;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="plugin-container">
        <div class="header">
            <span class="header-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5"
                    stroke-linecap="square" stroke-linejoin="miter">
                    <path d="M20 20H7L3 16c0 0 0-2 0-2.8L14.6 1.6c0 0 2 0 2.8 0L21.4 5.6c0 0 0 2 0 2.8L10 20" />
                </svg>
                Eraser
            </span>
            <span class="header-badge">v1.1</span>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <!-- MS Paint Toolbar Left -->
            <div class="left-toolbar" id="leftToolbar" style="display:none">
                <!-- Lasso -->
                <button class="win95-tool-btn" id="btnLasso" title="Lasso Tool (L)">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 22a5 5 0 0 1-2-4" />
                        <path d="M7 16.93c.96.43 1.96.74 2.99.91" />
                        <path
                            d="M3.34 14A6.8 6.8 0 0 1 2 10c0-4.42 4.48-8 10-8s10 3.58 10 8-4.48 8-10 8a12 12 0 0 1-3-.38" />
                        <path d="M5 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" />
                    </svg>
                </button>

                <!-- Brush -->
                <button class="win95-tool-btn active" id="btnBrush" title="Brush Tool (B)">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
                <!-- Undo -->
                <button class="win95-tool-btn disabled" id="btnUndo" title="Undo (Ctrl+Z)">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 7v6h6" />
                        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
                    </svg>
                </button>
                <!-- Redo -->
                <button class="win95-tool-btn disabled" id="btnRedo" title="Redo (Ctrl+Shift+Z)">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 7v6h-6" />
                        <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" />
                    </svg>
                </button>


            </div>

            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24">
                            <rect width="18" height="18" x="3" y="3" rx="0" ry="0" />
                            <circle cx="9" cy="9" r="2" />
                            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                        </svg>
                    </div>
                    <div class="empty-state-title">Select an Image</div>
                    <div class="empty-state-desc">Select a node with an image fill on the Figma canvas to start removing
                        its background.</div>
                    <button class="btn" id="btnRestore" style="display:none; margin-top:12px;">Restore Original</button>
                </div>

                <div class="loading-overlay" id="loadingOverlay" style="display:none">
                    <div class="spinner"></div>
                    <div class="loading-text">Loading image…</div>
                </div>

                <!-- Canvas container (zoom/pan transforms applied here) -->
                <div class="canvas-inner" id="canvasInner" style="display:none">
                    <canvas id="checkerboard"></canvas>
                    <canvas id="image-canvas"></canvas>
                    <canvas id="mask-canvas"></canvas>
                    <canvas id="brush-canvas"></canvas>
                </div>

                <!-- Zoom UI (Relative to .canvas-area) -->
                <div class="zoom-badge" id="zoomBadge" style="display:none">100%</div>
                <div class="zoom-controls" id="zoomControls" style="display:none">
                    <button class="zoom-btn" id="btnZoomOut" title="Zoom Out (-)">−</button>
                    <button class="zoom-btn" id="btnZoomReset" title="Fit (0)">⊡</button>
                    <button class="zoom-btn" id="btnZoomIn" title="Zoom In (+)">+</button>
                </div>
            </div>

        </div>

        <!-- Bottom Area (Sliders & Actions) -->
        <div class="bottom-area" id="bottomArea" style="display:none">
            <!-- Sliders -->
            <div class="sliders-row" id="slidersSection">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Brush Size</span>
                        <span class="slider-value" id="sizeValue">20</span>
                    </div>
                    <input type="range" id="brushSize" min="2" max="100" value="20" />
                </div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Hardness</span>
                        <span class="slider-value" id="hardValue">80%</span>
                    </div>
                    <input type="range" id="brushHardness" min="0" max="100" value="80" />
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions-row" id="actionsSection">
                <button class="btn" id="btnClear">Clear All</button>
                <button class="btn btn-primary" id="btnApply" disabled>Erase</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Select an image to begin</div>
    </div>

    <div class="cursor-ring" id="cursorRing" style="display:none"></div>
    <div class="toast" id="toast"></div>

    <script>
        // ═══════════════════════════════════════════════════════
        //  Brush Background Remover — Plugin UI v1.1
        //  Features: Brush, Lasso, Zoom/Pan
        // ═══════════════════════════════════════════════════════

        (function () {
            "use strict";

            // ─── DOM ──────────────────────────────────────────
            const canvasWrapper = document.getElementById("canvasWrapper");
            const canvasInner = document.getElementById("canvasInner");
            const emptyState = document.getElementById("emptyState");
            const loadingOverlay = document.getElementById("loadingOverlay");
            const checkerboard = document.getElementById("checkerboard");
            const imageCanvas = document.getElementById("image-canvas");
            const maskCanvas = document.getElementById("mask-canvas");
            const brushCanvas = document.getElementById("brush-canvas");
            const cursorRing = document.getElementById("cursorRing");
            const toast = document.getElementById("toast");
            const statusBar = document.getElementById("statusBar");
            const zoomBadge = document.getElementById("zoomBadge");
            const zoomControls = document.getElementById("zoomControls");

            const leftToolbar = document.getElementById("leftToolbar");
            const bottomArea = document.getElementById("bottomArea");

            const btnRestore = document.getElementById("btnRestore");

            const btnBrush = document.getElementById("btnBrush");
            const btnLasso = document.getElementById("btnLasso");
            // const btnErase = document.getElementById("btnErase");
            const btnUndo = document.getElementById("btnUndo");
            const btnRedo = document.getElementById("btnRedo");
            const btnApply = document.getElementById("btnApply");
            const btnClear = document.getElementById("btnClear");
            const btnZoomIn = document.getElementById("btnZoomIn");
            const btnZoomOut = document.getElementById("btnZoomOut");
            const btnZoomReset = document.getElementById("btnZoomReset");

            const brushSizeSlider = document.getElementById("brushSize");
            const brushHardSlider = document.getElementById("brushHardness");
            const sizeValue = document.getElementById("sizeValue");
            const hardValue = document.getElementById("hardValue");

            // ─── State ────────────────────────────────────────
            let currentNodeId = null;
            let imgWidth = 0, imgHeight = 0;
            let displayWidth = 0, displayHeight = 0;
            let baseScale = 1;   // scale from image to display size
            let offsetX = 0, offsetY = 0;

            // Tools & modes
            let tool = "brush";     // "brush" | "lasso"
            let mode = "erase";     // "erase" | "restore"
            let brushSize = 20;
            let brushHardness = 80;
            let isDrawing = false;
            let isEditing = false;

            // Zoom & Pan
            let zoom = 1;
            const ZOOM_MIN = 0.5, ZOOM_MAX = 10, ZOOM_STEP = 0.15;
            let panX = 0, panY = 0;
            let isPanning = false;
            let panStart = { x: 0, y: 0 };
            let spaceDown = false;

            // History
            let history = [];
            let historyIndex = -1;
            const MAX_HISTORY = 30;
            let hasStrokes = false;
            let loadedImage = null;

            // Lasso
            let lassoPoints = [];

            // Brush interpolation
            let lastPoint = null;

            // ─── Utils ────────────────────────────────────────
            function showToast(msg, type) {
                toast.textContent = msg;
                toast.className = "toast " + (type || "");
                setTimeout(() => toast.classList.add("visible"), 10);
                setTimeout(() => toast.classList.remove("visible"), 2500);
            }
            function setStatus(msg) { statusBar.textContent = msg; }

            function showEditorUI(show) {
                const d = show ? "" : "none";
                leftToolbar.style.display = d;
                bottomArea.style.display = d;
                btnRestore.style.display = "none";
                if (show) {
                    zoomBadge.style.display = "";
                    zoomControls.style.display = "flex";
                } else {
                    zoomBadge.style.display = "none";
                    zoomControls.style.display = "none";
                }
            }

            // ─── Zoom / Pan helpers ───────────────────────────
            function updateTransform() {
                const t = `translate(${panX}px, ${panY}px) scale(${zoom})`;
                canvasInner.style.transform = t;
                canvasInner.style.webkitTransform = t;
                zoomBadge.textContent = Math.round(zoom * 100) + "%";
            }

            function zoomTo(newZoom, pivotX, pivotY) {
                newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
                if (Math.abs(newZoom - zoom) < 0.001) return;
                const ratio = newZoom / zoom;
                panX = pivotX - (pivotX - panX) * ratio;
                panY = pivotY - (pivotY - panY) * ratio;
                zoom = newZoom;
                updateTransform();
            }

            function fitToView() {
                // Defer to next frame so layout is finalized after showing/hiding UI elements
                requestAnimationFrame(() => {
                    const wr = canvasWrapper.getBoundingClientRect();
                    zoom = 1;
                    panX = Math.round((wr.width - displayWidth) / 2);
                    panY = Math.round((wr.height - displayHeight) / 2);
                    updateTransform();
                });
            }

            // ─── Canvas → image coordinate mapping ───────────
            function screenToCanvas(clientX, clientY) {
                const wr = canvasWrapper.getBoundingClientRect();
                const sx = clientX - wr.left;
                const sy = clientY - wr.top;
                return {
                    x: (sx - panX) / zoom,
                    y: (sy - panY) / zoom,
                };
            }

            function getBrushRadius() {
                return (brushSize / 2) * baseScale;
            }

            // ─── Checkerboard ─────────────────────────────────
            function drawCheckerboard(ctx, w, h) {
                const sz = 8;
                for (let y = 0; y < h; y += sz) {
                    for (let x = 0; x < w; x += sz) {
                        ctx.fillStyle = ((x / sz + y / sz) % 2 === 0) ? "#e0e0e0" : "#c0c0c0";
                        ctx.fillRect(x, y, sz, sz);
                    }
                }
            }

            // ─── Canvas Setup ─────────────────────────────────
            function setupCanvases(img) {
                const wr = canvasWrapper.getBoundingClientRect();
                const maxW = wr.width - 20, maxH = wr.height - 20;
                const sx = maxW / img.width, sy = maxH / img.height;
                baseScale = Math.min(sx, sy, 1);

                displayWidth = Math.round(img.width * baseScale);
                displayHeight = Math.round(img.height * baseScale);

                [checkerboard, imageCanvas, maskCanvas, brushCanvas].forEach(c => {
                    c.width = displayWidth;
                    c.height = displayHeight;
                    c.style.width = displayWidth + "px";
                    c.style.height = displayHeight + "px";
                });

                canvasInner.style.display = "block";
                canvasInner.style.width = displayWidth + "px";
                canvasInner.style.height = displayHeight + "px";

                drawCheckerboard(checkerboard.getContext("2d"), displayWidth, displayHeight);

                const imgCtx = imageCanvas.getContext("2d");
                imgCtx.clearRect(0, 0, displayWidth, displayHeight);
                imgCtx.drawImage(img, 0, 0, displayWidth, displayHeight);

                const maskCtx = maskCanvas.getContext("2d");
                maskCtx.fillStyle = "#ffffff";
                maskCtx.fillRect(0, 0, displayWidth, displayHeight);

                brushCanvas.getContext("2d").clearRect(0, 0, displayWidth, displayHeight);

                history = []; historyIndex = -1;
                pushHistory();
                hasStrokes = false;
                updateApplyButton();

                // Reset zoom/pan to fit
                fitToView();
            }

            // ─── History ──────────────────────────────────────
            function pushHistory() {
                const data = maskCanvas.getContext("2d").getImageData(0, 0, displayWidth, displayHeight);
                if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
                history.push(data);
                if (history.length > MAX_HISTORY) history.shift();
                historyIndex = history.length - 1;
                updateUndoRedo();
            }
            function undo() {
                if (historyIndex > 0) {
                    historyIndex--;
                    maskCanvas.getContext("2d").putImageData(history[historyIndex], 0, 0);
                    applyMaskPreview(); updateUndoRedo(); checkHasStrokes();
                }
            }
            function redo() {
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    maskCanvas.getContext("2d").putImageData(history[historyIndex], 0, 0);
                    applyMaskPreview(); updateUndoRedo(); checkHasStrokes();
                }
            }
            function updateUndoRedo() {
                btnUndo.classList.toggle("disabled", historyIndex <= 0);
                btnRedo.classList.toggle("disabled", historyIndex >= history.length - 1);
            }
            function checkHasStrokes() {
                const d = maskCanvas.getContext("2d").getImageData(0, 0, displayWidth, displayHeight).data;
                hasStrokes = false;
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i] < 255) { hasStrokes = true; break; }
                }
                updateApplyButton();
            }
            function updateApplyButton() { btnApply.disabled = !hasStrokes; }

            // ─── Mask Preview ─────────────────────────────────
            function applyMaskPreview() {
                const imgCtx = imageCanvas.getContext("2d");
                imgCtx.clearRect(0, 0, displayWidth, displayHeight);
                imgCtx.drawImage(loadedImage, 0, 0, displayWidth, displayHeight);

                const imgData = imgCtx.getImageData(0, 0, displayWidth, displayHeight);
                const maskData = maskCanvas.getContext("2d").getImageData(0, 0, displayWidth, displayHeight);

                for (let i = 0; i < imgData.data.length; i += 4) {
                    imgData.data[i + 3] = Math.min(imgData.data[i + 3], maskData.data[i]);
                }
                imgCtx.putImageData(imgData, 0, 0);
            }

            // ─── Brush Painting ───────────────────────────────
            function paintAt(ctx, x, y) {
                const r = getBrushRadius();
                const h = brushHardness / 100;
                const color = (mode === "erase") ? "0,0,0" : "255,255,255";

                ctx.globalCompositeOperation = "source-over";
                if (h >= 0.95) {
                    ctx.fillStyle = (mode === "erase") ? "#000" : "#fff";
                    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                } else {
                    const g = ctx.createRadialGradient(x, y, r * h, x, y, r);
                    g.addColorStop(0, `rgba(${color},1)`);
                    g.addColorStop(1, `rgba(${color},0)`);
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                }
            }

            function drawStroke(ctx, x, y) {
                if (lastPoint) {
                    const dx = x - lastPoint.x, dy = y - lastPoint.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const step = Math.max(getBrushRadius() * 0.25, 1);
                    if (dist > step) {
                        const n = Math.ceil(dist / step);
                        for (let i = 1; i <= n; i++) {
                            const t = i / n;
                            paintAt(ctx, lastPoint.x + dx * t, lastPoint.y + dy * t);
                        }
                    } else {
                        paintAt(ctx, x, y);
                    }
                } else {
                    paintAt(ctx, x, y);
                }
                lastPoint = { x, y };
            }

            // ─── Lasso Drawing ────────────────────────────────
            function drawLassoPreview() {
                const bCtx = brushCanvas.getContext("2d");
                bCtx.clearRect(0, 0, displayWidth, displayHeight);
                if (lassoPoints.length < 2) return;

                bCtx.strokeStyle = (mode === "erase")
                    ? "rgba(255, 80, 100, 0.9)"
                    : "rgba(80, 200, 140, 0.9)";
                bCtx.lineWidth = 2 / zoom; // keep line visually consistent
                bCtx.setLineDash([6 / zoom, 4 / zoom]);
                bCtx.beginPath();
                bCtx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                for (let i = 1; i < lassoPoints.length; i++) {
                    bCtx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                }
                // Draw closing line to start
                bCtx.lineTo(lassoPoints[0].x, lassoPoints[0].y);
                bCtx.stroke();
                bCtx.setLineDash([]);

                // Fill with semi-transparent preview
                bCtx.fillStyle = (mode === "erase")
                    ? "rgba(255, 50, 80, 0.15)"
                    : "rgba(80, 255, 140, 0.15)";
                bCtx.fill();
            }

            function applyLasso() {
                if (lassoPoints.length < 3) { lassoPoints = []; return; }

                const maskCtx = maskCanvas.getContext("2d");
                maskCtx.beginPath();
                maskCtx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                for (let i = 1; i < lassoPoints.length; i++) {
                    maskCtx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                }
                maskCtx.closePath();

                maskCtx.fillStyle = (mode === "erase") ? "#000000" : "#ffffff";
                maskCtx.fill();

                lassoPoints = [];
                brushCanvas.getContext("2d").clearRect(0, 0, displayWidth, displayHeight);
                applyMaskPreview();
                pushHistory();
                hasStrokes = true;
                updateApplyButton();
            }

            // ─── Pointer Events on Canvas ─────────────────────
            canvasWrapper.addEventListener("pointerdown", (e) => {
                if (!loadedImage) return;

                // Pan with middle button or space+left
                if (e.button === 1 || (spaceDown && e.button === 0)) {
                    isPanning = true;
                    panStart = { x: e.clientX - panX, y: e.clientY - panY };
                    canvasWrapper.style.cursor = "grabbing";
                    canvasWrapper.setPointerCapture(e.pointerId);
                    e.preventDefault();
                    return;
                }

                if (e.button !== 0) return;
                if (spaceDown) return; // space held = pan mode, don't draw

                // Notify backend
                if (!isEditing) {
                    isEditing = true;
                    parent.postMessage({ pluginMessage: { type: "editing-started" } }, "*");
                }

                const pos = screenToCanvas(e.clientX, e.clientY);

                if (tool === "brush") {
                    isDrawing = true;
                    lastPoint = null;
                    drawStroke(maskCanvas.getContext("2d"), pos.x, pos.y);
                    applyMaskPreview();
                } else if (tool === "lasso") {
                    if (lassoPoints.length === 0) {
                        // Start new lasso
                        lassoPoints = [pos];
                    }
                    isDrawing = true;
                }

                canvasWrapper.setPointerCapture(e.pointerId);
            });

            canvasWrapper.addEventListener("pointermove", (e) => {
                if (!loadedImage) return;

                // Panning
                if (isPanning) {
                    panX = e.clientX - panStart.x;
                    panY = e.clientY - panStart.y;
                    updateTransform();
                    return;
                }

                const pos = screenToCanvas(e.clientX, e.clientY);

                // Update cursor ring (brush only)
                if (tool === "brush" && !spaceDown) {
                    cursorRing.style.display = "block";
                    cursorRing.style.left = e.clientX + "px";
                    cursorRing.style.top = e.clientY + "px";
                    const d = getBrushRadius() * 2 * zoom;
                    cursorRing.style.width = d + "px";
                    cursorRing.style.height = d + "px";
                } else {
                    cursorRing.style.display = "none";
                }

                if (!isDrawing) return;

                if (tool === "brush") {
                    drawStroke(maskCanvas.getContext("2d"), pos.x, pos.y);
                    applyMaskPreview();
                } else if (tool === "lasso") {
                    lassoPoints.push(pos);
                    drawLassoPreview();
                }
            });

            canvasWrapper.addEventListener("pointerup", (e) => {
                if (isPanning) {
                    isPanning = false;
                    canvasWrapper.style.cursor = "";
                    canvasWrapper.releasePointerCapture(e.pointerId);
                    return;
                }

                if (!isDrawing) return;
                isDrawing = false;
                lastPoint = null;

                if (tool === "brush") {
                    pushHistory();
                    hasStrokes = true;
                    updateApplyButton();
                } else if (tool === "lasso") {
                    applyLasso();
                }

                canvasWrapper.releasePointerCapture(e.pointerId);
            });

            canvasWrapper.addEventListener("pointerleave", () => {
                cursorRing.style.display = "none";
            });

            // ─── Wheel / Trackpad → Zoom + Pan ─────────────────
            // ctrlKey = pinch-to-zoom on trackpad → zoom
            // no ctrlKey = two-finger slide on trackpad → pan
            // mouse scroll wheel (no ctrlKey, large deltaY) → zoom
            function handleWheel(e) {
                if (!loadedImage) return;
                e.preventDefault();
                e.stopPropagation();

                if (e.ctrlKey) {
                    // Pinch-to-zoom (trackpad) or Ctrl+scroll
                    const wr = canvasWrapper.getBoundingClientRect();
                    const pivotX = e.clientX - wr.left;
                    const pivotY = e.clientY - wr.top;
                    // Pinch deltaY is small (-2 to 2), so use a sensitive factor
                    const zoomDelta = -e.deltaY * 0.01;
                    zoomTo(zoom * (1 + zoomDelta), pivotX, pivotY);
                } else if (Math.abs(e.deltaX) > 0 || (Math.abs(e.deltaY) < 50 && e.deltaMode === 0)) {
                    // Two-finger slide (trackpad pan) — has deltaX and/or small deltaY
                    panX -= e.deltaX;
                    panY -= e.deltaY;
                    updateTransform();
                } else {
                    // Regular mouse scroll wheel → zoom from center
                    const wr = canvasWrapper.getBoundingClientRect();
                    const pivotX = e.clientX - wr.left;
                    const pivotY = e.clientY - wr.top;
                    const factor = e.deltaY > 0 ? 1 / 1.12 : 1.12;
                    zoomTo(zoom * factor, pivotX, pivotY);
                }
            }
            canvasWrapper.addEventListener("wheel", handleWheel, { passive: false });
            canvasInner.addEventListener("wheel", handleWheel, { passive: false });

            // ─── Toolbar Events ───────────────────────────────
            btnBrush.addEventListener("click", () => {
                tool = "brush";
                btnBrush.classList.add("active");
                btnLasso.classList.remove("active");
                brushCanvas.style.cursor = "none";
                setStatus("Brush — paint to erase");
            });

            btnLasso.addEventListener("click", () => {
                tool = "lasso";
                btnLasso.classList.add("active");
                btnBrush.classList.remove("active");
                cursorRing.style.display = "none";
                brushCanvas.style.cursor = "crosshair";
                setStatus("Lasso — draw a selection to erase");
            });

            /*
                        btnErase.addEventListener("click", () => {
                            btnErase.classList.add("active");
                            setStatus(tool === "brush" ? "Brush — paint to erase" : "Lasso — draw a selection to erase");
                        });
            */

            btnUndo.addEventListener("click", undo);
            btnRedo.addEventListener("click", redo);

            btnRestore.addEventListener("click", () => {
                parent.postMessage({ pluginMessage: { type: "restore-original" } }, "*");
            });

            zoomControls.addEventListener("pointerdown", (e) => e.stopPropagation());
            zoomControls.addEventListener("mousedown", (e) => e.stopPropagation());

            btnZoomIn.addEventListener("click", (e) => {
                e.stopPropagation();
                const wr = canvasWrapper.getBoundingClientRect();
                zoomTo(zoom * 1.25, wr.width / 2, wr.height / 2);
            });
            btnZoomOut.addEventListener("click", (e) => {
                e.stopPropagation();
                const wr = canvasWrapper.getBoundingClientRect();
                zoomTo(zoom / 1.25, wr.width / 2, wr.height / 2);
            });
            btnZoomReset.addEventListener("click", (e) => {
                e.stopPropagation();
                fitToView();
            });

            // ─── Keyboard Shortcuts ───────────────────────────
            document.addEventListener("keydown", (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === "z") {
                    e.preventDefault();
                    e.shiftKey ? redo() : undo();
                }
                if (e.key === " " && !spaceDown) {
                    spaceDown = true;
                    canvasWrapper.style.cursor = "grab";
                    cursorRing.style.display = "none";
                    e.preventDefault();
                }
                if (e.key === "b" || e.key === "B") btnBrush.click();
                if (e.key === "l" || e.key === "L") btnLasso.click();
                // if (e.key === "e" || e.key === "E") btnErase.click();
                if (e.key === "[") { brushSize = Math.max(2, brushSize - 5); brushSizeSlider.value = brushSize; sizeValue.textContent = brushSize; }
                if (e.key === "]") { brushSize = Math.min(100, brushSize + 5); brushSizeSlider.value = brushSize; sizeValue.textContent = brushSize; }
                if (e.key === "0") fitToView();
                if (e.key === "=" || e.key === "+") {
                    const wr = canvasWrapper.getBoundingClientRect();
                    zoomTo(zoom * 1.25, wr.width / 2, wr.height / 2);
                }
                if (e.key === "-") {
                    const wr = canvasWrapper.getBoundingClientRect();
                    zoomTo(zoom / 1.25, wr.width / 2, wr.height / 2);
                }
            });

            document.addEventListener("keyup", (e) => {
                if (e.key === " ") {
                    spaceDown = false;
                    canvasWrapper.style.cursor = "";
                }
            });

            // Sliders
            brushSizeSlider.addEventListener("input", (e) => {
                brushSize = parseInt(e.target.value, 10);
                sizeValue.textContent = brushSize;
            });
            brushHardSlider.addEventListener("input", (e) => {
                brushHardness = parseInt(e.target.value, 10);
                hardValue.textContent = brushHardness + "%";
            });

            btnClear.addEventListener("click", () => {
                if (!loadedImage) return;
                const maskCtx = maskCanvas.getContext("2d");
                maskCtx.fillStyle = "#ffffff";
                maskCtx.fillRect(0, 0, displayWidth, displayHeight);
                applyMaskPreview();
                pushHistory();
                hasStrokes = false;
                updateApplyButton();
                showToast("Cleared all strokes", "success");
            });

            btnApply.addEventListener("click", () => {
                if (!loadedImage || !hasStrokes || !currentNodeId) return;

                const tempCanvas = document.createElement("canvas");
                tempCanvas.width = imgWidth;
                tempCanvas.height = imgHeight;
                const tempCtx = tempCanvas.getContext("2d");

                tempCtx.drawImage(loadedImage, 0, 0, imgWidth, imgHeight);

                const maskCtx = maskCanvas.getContext("2d");
                const maskImageData = maskCtx.getImageData(0, 0, displayWidth, displayHeight);
                const fullImgData = tempCtx.getImageData(0, 0, imgWidth, imgHeight);

                for (let y = 0; y < imgHeight; y++) {
                    for (let x = 0; x < imgWidth; x++) {
                        const mx = Math.min(Math.floor(x * displayWidth / imgWidth), displayWidth - 1);
                        const my = Math.min(Math.floor(y * displayHeight / imgHeight), displayHeight - 1);
                        const maskIdx = (my * displayWidth + mx) * 4;
                        const imgIdx = (y * imgWidth + x) * 4;
                        const origA = fullImgData.data[imgIdx + 3];
                        const maskA = maskImageData.data[maskIdx];
                        fullImgData.data[imgIdx + 3] = Math.min(origA, maskA);
                    }
                }

                tempCtx.putImageData(fullImgData, 0, 0);

                const dataUrl = tempCanvas.toDataURL("image/png");
                const base64 = dataUrl.split(",")[1];

                parent.postMessage({
                    pluginMessage: { type: "apply-mask", imageData: base64, nodeId: currentNodeId },
                }, "*");

                btnApply.disabled = true;
                btnApply.textContent = "Applying…";
                setStatus("Applying mask…");
            });


            // ─── Messages from Backend ────────────────────────
            window.onmessage = (event) => {
                const msg = event.data.pluginMessage;
                if (!msg) return;

                switch (msg.type) {
                    case "no-selection":
                    case "multiple-selection":
                    case "invalid-selection":
                        showEditorUI(false);
                        btnRestore.style.display = "none";
                        emptyState.style.display = "flex";
                        const titles = {
                            "no-selection": "Select something",
                            "multiple-selection": "Multiple Selection",
                            "invalid-selection": "Cannot Edit"
                        };
                        const descs = {
                            "no-selection": "Select an image, vector, or group to start erasing.",
                            "multiple-selection": "Please select a single element to edit.",
                            "invalid-selection": "This element cannot be erased (try a basic layer)."
                        };
                        emptyState.querySelector(".empty-state-title").textContent = titles[msg.type];
                        emptyState.querySelector(".empty-state-desc").textContent = descs[msg.type];
                        loadingOverlay.style.display = "none";
                        hideCanvases();
                        currentNodeId = null; loadedImage = null; isEditing = false;
                        break;

                    case "already-processed":
                        showEditorUI(false);
                        emptyState.style.display = "flex";
                        emptyState.querySelector(".empty-state-title").textContent = "Already Processed";
                        emptyState.querySelector(".empty-state-desc").textContent = "Background already removed.";
                        btnRestore.style.display = "";
                        loadingOverlay.style.display = "none";
                        hideCanvases();
                        break;

                    case "loading":
                        loadingOverlay.style.display = "flex";
                        emptyState.style.display = "none";
                        setStatus("Exporting image…");
                        break;

                    case "image-loaded":
                        currentNodeId = msg.nodeId;
                        loadImageData(msg.data);
                        break;

                    case "mask-applied":
                        showToast("✅ Erased!", "success");
                        setStatus("Applied! Paint more strokes or select another layer.");
                        btnApply.textContent = "Erase";
                        btnApply.disabled = true; // disabled until new strokes are painted
                        if (msg.continuationImage) {
                            // Reload the editor with the composited result immediately
                            // (no Figma re-export — the image we composited IS what went to Figma)
                            if (msg.nodeId) currentNodeId = msg.nodeId;
                            loadImageData(msg.continuationImage);
                        } else {
                            // Fallback: clear state
                            btnApply.textContent = "Erase";
                            btnApply.disabled = true;
                            hasStrokes = false;
                            isEditing = false; loadedImage = null; currentNodeId = null;
                            parent.postMessage({ pluginMessage: { type: "editing-stopped" } }, "*");
                        }
                        break;

                    case "restored":
                        showToast("✅ Original restored!", "success");
                        setStatus("Image restored");
                        break;

                    case "error":
                        showToast("❌ " + msg.message, "error");
                        btnApply.textContent = "Erase";
                        btnApply.disabled = false;
                        setStatus("Error: " + msg.message);
                        break;
                }
            };

            function hideCanvases() {
                canvasInner.style.display = "none";
                cursorRing.style.display = "none";
            }

            function loadImageData(base64) {
                if (!base64 || !base64.length) {
                    showToast("No image data", "error");
                    loadingOverlay.style.display = "none";
                    emptyState.style.display = "flex";
                    return;
                }
                const img = new Image();
                img.onload = () => {
                    loadedImage = img;
                    // Set actual pixel dimensions from the loaded image, not from Figma layout units
                    imgWidth = img.naturalWidth || img.width;
                    imgHeight = img.naturalHeight || img.height;
                    isEditing = true;
                    emptyState.style.display = "none";
                    loadingOverlay.style.display = "none";
                    showEditorUI(true);
                    setupCanvases(img);
                    applyMaskPreview();
                    // Default to erase mode active
                    // btnErase.classList.add("active");
                    // btnRestoreMode.classList.remove("active");
                    setStatus("Brush erase — paint to remove background");
                    showToast("Image loaded!", "success");
                    parent.postMessage({ pluginMessage: { type: "editing-started" } }, "*");
                };
                img.onerror = (err) => {
                    console.error("Image load error", err);
                    showToast("Failed to load image", "error");
                    loadingOverlay.style.display = "none";
                    emptyState.style.display = "flex";
                };
                img.src = "data:image/png;base64," + base64;
            }

            // ─── Initial check ────────────────────────────────
            parent.postMessage({ pluginMessage: { type: "check-selection" } }, "*");

        })();
    </script>
</body>

</html>
